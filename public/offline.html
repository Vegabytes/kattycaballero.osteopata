<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión | Katy Caballero</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f6f0;
      color: #3d3d3d;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .offline-card {
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      padding: 48px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .offline-icon {
      width: 64px;
      height: 64px;
      color: #5a7c59;
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: #4a6548;
      font-size: 1.8rem;
      margin-bottom: 12px;
    }
    p {
      color: #6b6b6b;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: #5a7c59;
      color: #fff;
      padding: 12px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .contact {
      margin-top: 24px;
      font-size: 0.85rem;
      color: #767676;
    }
    .contact a { color: #5a7c59; }
  </style>
</head>
<body>
  <div class="offline-card">
    <svg class="offline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <h1>Sin conexión</h1>
    <p>Parece que no tienes conexión a internet. Comprueba tu conexión e inténtalo de nuevo.</p>
    <a href="/" class="btn" onclick="window.location.reload(); return false;">Reintentar</a>
    <div class="contact">
      <p>¿Necesitas contactarme? Llámame al <a href="tel:+34643961065">643 961 065</a></p>
    </div>
  </div>
</body>
</html>
