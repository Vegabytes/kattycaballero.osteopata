# DO NOT add it here. For local dev, put it in workers/.dev.vars (gitignored).
[vars]
VAPID_PUBLIC_KEY = "BN2_yYwSv4wQE3GsMkPFzPOq1t_6gXuH5RX25GwVzSn8Q3FHmk_meZ5eQyqV2tcmgCti__mxy13TUzBKJ7g7NQA"

[[d1_databases]]
